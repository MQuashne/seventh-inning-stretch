<!DOCTYPE html>
<html lang="en" data-team="PHI">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href='team-colors.css' rel='stylesheet' />
  <link href='styles.css' rel='stylesheet' />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Serif+4:wght@300;400;600&family=IBM+Plex+Mono:wght@400;600&family=Oswald:wght@400;500;600;700&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <link href='styles.css' rel='stylesheet' />
  
  
  <title></title>
</head>

<body>
  
  <div id="main-screen">
    
    <div class="game-header-outer">
      <div class="game-header">
        <div class="game-header-team">
          Your Team
        </div>
      </div>
    </div>
    <div id="insert"></div>
    <div class='modal-backdrop hidden' id='modal-backdrop'>
      <div class="dialog medium">
        <div class='modal-header'>
          <div class="modal-title">Spring Training</div>
        </div>
        <div class='modal-body lawn-stripes'></div>
      </div>
    </div>
    
    <!-- CALENDAR SCREEN -->
    
    <div id="cal-content" class="main-content">
      <div id="calendar-heading" class="section-heading">Calendar</div>
      <div class="section-subheading">"Here's what on the schedule, coach."</div>
      <div id="calendar" class="section-ts">
        <div id="calendar-body" class="section-body">
        </div>
      </div>
    </div>
    <!-- LINEUP SCREEN -->
    
    <div id="lineup-content" class="main-content hidden">
      <div id="lineup-heading" class="section-heading">Lineup</div>
      <div class="section-subheading">"The talent."</div>
    </div>
    
    <!-- TEAM SETUP SCREEN -->
    
    <div id="team-setup-content" class="main-content hidden">

      <div id="team-heading" class="section-heading">Your Team</div>
      <div class="section-subheading">"This is us, skipper."</div>
    </div>
    
    <div id="game-footer">
      <nav id="game-nav">
        <div id="schedule-nav" class="nav-item active" data-section="cal-content"><span class="material-symbols-outlined">
            calendar_month
          </span><span class="menu-label">CALENDAR</span></div>
        <div id="lineup-nav" class="nav-item" data-section="lineup-content"><span class="material-symbols-outlined">
            recent_actors
          </span><span class="menu-label">LINEUP</span></div>
        <div id="team-nav" class="nav-item" data-section="team-setup-content"><span class="material-symbols-outlined">
            apparel
          </span><span class="menu-label">TEAM</span></div>
      </nav>
    </div>
  </div>
  <svg width="0" height="0" style="position: absolute;">
    <filter id="wood-grain" filterUnits="objectBoundingBox" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.01 0.2" result="noise" />
      
      <!-- 3. Optional: Add a slight lighting effect for a 3D painted texture -->
      <feDiffuseLighting in="noise" lighting-color="#fff" surfaceScale="2" result="light">
        <feDistantLight azimuth="45" elevation="60" />
      </feDiffuseLighting>
      <feComposite operator="in" in2="SourceGraphic" in="light" result="litGraphic" />
      <feBlend mode="multiply" in2="SourceGraphic" in1="litGraphic" />
    </filter>
  </svg>
  
  
  <script src="dice/libs/three.min.js"></script>
  <script src="dice/libs/cannon.min.js"></script>
  <script src="dice/libs/teal.js"></script>
  <script src="dice/dice.js" type='module'></script>
  <script src='main.js' type='module'></script>
</body>

</html>
