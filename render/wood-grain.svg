<svg style="display: none;">
  <filter id="wood-filter">
    <!-- 1. Generate stretched, fine vertical noise -->
    <feTurbulence type="fractalNoise" baseFrequency="0.01 0.1" numOctaves="3" result="noise" />
    
    <!-- 2. Shift the pixels slightly to create "wood waves" -->
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" xChannelSelector="R" yChannelSelector="G" result="grain" />
    
    <!-- 3. Blend the grainy texture back onto your CSS color -->
    <feBlend mode="multiply" in="grain" in2="SourceGraphic" />
  </filter>
</svg>