<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MLB Team Colors</title>
    <style>
        @font-face{
            font-family:'BaseballClubSolid';
            src:url("../../../public/assets/BaseballClubSolid-E4X69.ttf");
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f5f5;
            margin: 20px;
        }
        
        h1 {
            margin-bottom: 25px;
        }
        
        .team {
            margin-bottom: 28px;
        }
        
        .team-name {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .palette {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom:12px;
        }
        
        .color {
            width: 120px;
            height: 90px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, .25);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, .25);
        }
        
        .role {
            font-size: 12px;
            font-weight: bold;
            letter-spacing: .06em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        
        .hex {
            font-family: Consolas, monospace;
            font-size: 18px;
            font-weight: bold;
        }
        
        .font {
            font-family: Consolas, monospace;
            font-size: 11px;
            margin-top: 8px;
        }
        .die-show{
            display:flex;
            flex-direction:column;
            width:55px;
            height:70px;
        }
        .die-label{
        font-family: Consolas, monospace;
            font-size: 11px;
            width:100%;
            height:18px;
        }
        .die-box {
            position: relative;
            height: 50px;
            width: 50px;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            font-size: 35px;
            font-family: "BaseballClubSolid";
           font-weight:100;
            color: #ffffff;
            -webkit-text-stroke: 0.2px transparent;
            border:1px solid #aaaaaa;
        }
        
        .die-box::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(at 5% 5%, #ffffff80 0%, #ffffff00 80%);
        }
    </style>
    
</head>

<body>
    
    <h1>Major League Baseball Team Colors</h1>
    
    <div id="teams"></div>
    
    
    <script src='color-main.js' type="module"></script>
</body>

</html>
